name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run tests

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist

      - name: Run tests
        run: ./vendor/bin/pest

  release:
    runs-on: ubuntu-latest
    needs: test
    name: Build and publish release

    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite

      - name: Build release zip
        run: bash scripts/build-release.sh "${{ steps.version.outputs.version }}"

      - name: Validate release
        run: |
          cd build/puls-${{ steps.version.outputs.version }}
          cp .env.example .env
          sed -i 's/APP_KEY=.*/APP_KEY=ci-test-key-32chars-placeholder/' .env
          php -S 127.0.0.1:8787 -t public &
          sleep 1
          status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8787/?health)
          kill %1 || true
          if [ "$status" != "200" ]; then
            echo "Health check failed with status $status"
            exit 1
          fi
          echo "Release validation passed (health check returned 200)"

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          version="${{ steps.version.outputs.version }}"
          changelog=$(awk "/^## \[${version}\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md)
          # Write to file for gh release
          echo "$changelog" > build/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "build/puls-${{ steps.version.outputs.version }}.zip" \
            --title "Puls ${{ steps.version.outputs.version }}" \
            --notes-file build/release-notes.md
